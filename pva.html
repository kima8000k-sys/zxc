<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE KAVA - Fix Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: #111118;
            --neon: #00f3ff;
            --purple: #bc13fe;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Rajdhani', sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column;
        }

        header { 
            height: 50px; background: #000; border-bottom: 2px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px; 
            position: sticky; top: 0; z-index: 100;
        }

        .main-container { display: flex; flex: 1; }

        /* КАТЕГОРИИ - теперь всегда слева, но узкие */
        .sidebar { 
            width: 70px; background: var(--panel); border-right: 1px solid #222; 
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .cat-btn { 
            padding: 15px 5px; background: none; border: none; color: #555; 
            text-align: center; cursor: pointer; border-bottom: 1px solid #1a1a1a; font-size: 10px; text-transform: uppercase;
        }
        .cat-btn.active { color: var(--neon); background: rgba(0,243,255,0.05); border-left: 3px solid var(--neon); }

        /* СЕТКА ТОВАРОВ - карточки стали меньше */
        .products-grid { 
            flex: 1; padding: 10px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 8px; align-content: start;
        }
        .item-card { 
            background: var(--panel); border-radius: 8px; padding: 8px; border: 1px solid #222; 
            display: flex; flex-direction: column; gap: 6px;
        }
        .item-card h3 { font-size: 12px; height: 28px; overflow: hidden; line-height: 1.1; }
        
        /* КНОПКИ РАЗМЕРОВ - более компактные */
        .size-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .s-btn { 
            background: #1a1a25; border: 1px solid #333; color: #fff; padding: 5px 2px; 
            border-radius: 4px; cursor: pointer; font-size: 10px; font-family: 'Orbitron';
        }
        .s-btn:active { background: var(--neon); color: #000; }

        /* КОРЗИНА - выезжает на мобилках */
        .cart-aside { 
            position: fixed; right: -100%; top: 50px; bottom: 0; width: 100%; 
            background: #000; z-index: 90; transition: 0.3s; display: flex; flex-direction: column;
        }
        .cart-aside.open { right: 0; }
        
        .cart-list { flex: 1; overflow-y: auto; padding: 15px; }
        .cart-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid #111; padding-bottom: 4px; }

        .calc-panel { padding: 15px; background: #0a0a0f; border-top: 2px solid var(--purple); }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        
        input[type="range"] { width: 100%; accent-color: var(--neon); }
        .cash-in { width: 70px; background: #000; border: 1px solid var(--neon); color: var(--neon); text-align: center; padding: 4px; font-size: 14px; }

        .total-box { font-family: 'Orbitron'; font-size: 20px; color: var(--neon); margin: 5px 0; display: flex; justify-content: space-between; }
        .pay-btn { width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; border-radius: 6px; font-weight: 900; font-size: 18px; }

        .mob-cart-btn { 
            position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; 
            background: var(--purple); border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            color: white; font-size: 20px; border: none; z-index: 110; box-shadow: 0 0 15px var(--purple);
        }

        /* Для планшетов и ПК возвращаем боковую корзину */
        @media (min-width: 900px) {
            .cart-aside { position: relative; right: 0; top: 0; width: 300px; border-left: 1px solid #333; }
            .mob-cart-btn { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div style="font-family:'Orbitron'; color:var(--neon); font-size:16px;">THE KAVA</div>
    <div style="color:var(--neon-yellow); font-size:14px;">КАСА: <span id="revenue">0</span> ₴</div>
</header>

<div class="main-container">
    <nav class="sidebar" id="cats-box"></nav>
    <main class="products-grid" id="prods-box"></main>
    
    <aside class="cart-aside" id="cart-ui">
        <div class="cart-list" id="cart-items"></div>
        <div class="calc-panel">
            <div class="row"><span>Знижка: <b id="dist-text">0</b> ₴</span></div>
            <input type="range" id="dist-slider" min="0" max="100" value="0" oninput="updateCart()">
            <div class="row" style="margin-top:10px;">
                <span>Готівка:</span>
                <input type="number" id="cash-input" class="cash-in" placeholder="0" oninput="updateCart()">
            </div>
            <div class="row"><span>Решта:</span> <span id="change-text" style="color:var(--neon)">0 ₴</span></div>
            <div class="total-box"><span>РАЗОМ:</span> <span id="total-text">0</span></div>
            <button class="pay-btn" onclick="handlePay()">ОПЛАТИТИ</button>
            <button onclick="toggleCart()" style="width:100%; margin-top:10px; background:none; border:none; color:#555;">ЗАКРИТИ</button>
        </div>
    </aside>
</div>

<button class="mob-cart-btn" onclick="toggleCart()">🛒</button>

<script>
    const BOT_TOKEN = "8778379603:AAE4JwVMKR4F7eKYntNMpMenf2NM6B65hZM";
    const CHAT_ID = "7568873881";

    const MENU = {
        "Кава": [
            { n: "Еспресо", p: { S: 35 } }, { n: "Допіо", p: { S: 55 } },
            { n: "Американо", p: { S: 35, M: 55 } }, { n: "Американо з мол.", p: { S: 40, M: 60 } },
            { n: "Капучино", p: { S: 55, M: 65, L: 75 } }, { n: "Лате", p: { S: 55, M: 65, L: 75 } },
            { n: "Раф кава", p: { S: 70, M: 80, L: 90 } }, { n: "Флет Вайт", p: { S: 65 } },
            { n: "Какао", p: { S: 50, M: 60, L: 70 } }, { n: "Лате матча", p: { S: 65, M: 75, L: 85 } },
            { n: "Гар. шоколад", p: { S: 65, M: 75, L: 85 } }, { n: "Мокачино", p: { S: 60, M: 70, L: 80 } }
        ],
        "Чай": [ { n: "Чай заварний", p: { M: 35, L: 40 } }, { n: "Натуральний", p: { M: 50, L: 55 } } ],
        "Кухня": [ { n: "Бургер", p: { "-": 85 } }, { n: "Донер", p: { "-": 120 } }, { n: "Паніні", p: { "-": 80 } } ],
        "Додатки": [ { n: "Сироп", p: { "-": 5 } }, { n: "Вершки", p: { "-": 15 } } ]
    };

    let cart = [];
    let curCat = "Кава";
    let dailyRev = parseFloat(localStorage.getItem('kava_rev_v3')) || 0;

    function render() {
        const cb = document.getElementById('cats-box'); cb.innerHTML = '';
        Object.keys(MENU).forEach(c => {
            cb.innerHTML += `<button class="cat-btn ${c===curCat?'active':''}" onclick="curCat='${c}';render()">${c}</button>`;
        });

        const pb = document.getElementById('prods-box'); pb.innerHTML = '';
        MENU[curCat].forEach(item => {
            let btns = '';
            for(let s in item.p) btns += `<button class="s-btn" onclick="addToCart('${item.n} ${s}', ${item.p[s]})">${s}<br>${item.p[s]}₴</button>`;
            pb.innerHTML += `<div class="item-card"><h3>${item.n}</h3><div class="size-btns">${btns}</div></div>`;
        });
        document.getElementById('revenue').innerText = dailyRev;
    }

    function addToCart(n, p) {
        let x = cart.find(f => f.n === n);
        if(x) x.q++; else cart.push({n, p, q:1});
        updateCart();
    }

    function updateCart() {
        const list = document.getElementById('cart-items'); list.innerHTML = '';
        let sub = 0;
        cart.forEach((item, i) => {
            sub += item.p * item.q;
            list.innerHTML += `<div class="cart-row"><span>${item.n} x${item.q}</span><span>${item.p*item.q}₴</span></div>`;
        });
        let dist = parseInt(document.getElementById('dist-slider').value);
        document.getElementById('dist-text').innerText = dist;
        let total = Math.max(0, sub - dist);
        document.getElementById('total-text').innerText = total + " ₴";
        let cash = parseFloat(document.getElementById('cash-input').value) || 0;
        document.getElementById('change-text').innerText = (cash > total ? (cash - total) : 0) + " ₴";
    }

    function toggleCart() { document.getElementById('cart-ui').classList.toggle('open'); }

    function handlePay() {
        if(!cart.length) return;
        const total = parseInt(document.getElementById('total-text').innerText);
        let msg = `🧾 ЧЕК: ${total}₴\n`;
        cart.forEach(x => msg += `• ${x.n} x${x.q}\n`);
        
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
        });

        dailyRev += total;
        localStorage.setItem('kava_rev_v3', dailyRev);
        alert("ОПЛАЧЕНО!");
        cart = []; document.getElementById('dist-slider').value = 0; updateCart(); render();
        if(window.innerWidth < 900) toggleCart();
    }

    render();
</script>
</body>
</html>
